services:
  postgres:
    image: postgres:16-alpine
    container_name: esports_postgres
    environment:
      POSTGRES_DB: esports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esports"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: esports_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  migrate:
    image: migrate/migrate:v4.19.0
    container_name: esports_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://postgres:postgres@postgres:5432/esports?sslmode=disable"
      - "up"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esports_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./credentials:/app/credentials:ro

volumes:
  postgres_data:
